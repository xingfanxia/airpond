<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Airpond</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;width:100%;height:100%}
#particles{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:screen}
#ui{position:fixed;bottom:env(safe-area-inset-bottom,20px);bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:10}
#ui button{padding:8px 20px;border:none;border-radius:20px;font-size:14px;cursor:pointer;
  background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);transition:background .2s;white-space:nowrap}
#ui button.active{background:rgba(100,180,255,0.4)}
#ui button:active{background:rgba(100,180,255,0.6)}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;color:#fff;font-family:system-ui;z-index:100;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
#loading p{margin-top:12px;font-size:14px;opacity:.7}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.top-btn{position:fixed;top:20px;z-index:10;width:40px;height:40px;
  border:none;border-radius:50%;background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;
  transition:background .2s}
#flip-btn{right:20px}
#hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.6);font-size:13px;font-family:system-ui;z-index:10;
  pointer-events:none;transition:opacity .5s}
#status{position:fixed;top:20px;left:20px;z-index:10;font-size:11px;font-family:system-ui;
  color:rgba(255,255,255,0.5);pointer-events:none;transition:opacity 1s}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Loading camera &amp; hand tracking...</p></div>
<div id="status"></div>
<canvas id="c"></canvas>
<canvas id="particles"></canvas>
<button id="flip-btn" class="top-btn" title="Flip Camera">&#x1F504;</button>
<div id="hint"></div>
<div id="ui">
  <button id="btn-crystal" class="active">Crystal</button>
  <button id="btn-star">Starlight</button>
  <button id="btn-portal">Portal</button>
  <button id="btn-pulse">Pulse</button>
</div>

<script type="module">
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {alpha:false, antialias:false, preserveDrawingBuffer:false});
if(!gl){alert('WebGL not supported');throw new Error('no webgl')}

const extFloat = gl.getExtension('OES_texture_float');
const extHalf = gl.getExtension('OES_texture_half_float');
const extLinF = gl.getExtension('OES_texture_float_linear');
const extLinH = gl.getExtension('OES_texture_half_float_linear');

let W, H, simW, simH;
let currentMode = 'crystal'; // 'crystal', 'starlight', 'portal', or 'pulse'
let facingMode = 'user';
let videoReady = false;
let handsReady = false;

const fingers = new Float32Array(30);
const prevFingers = new Float32Array(30);

// ========== PORTAL STATE ==========
let portalOpen = 0.0;       // 0 = closed, 1 = fully open (animated)
let portalCx = 0.5;         // hand center X (normalized)
let portalCy = 0.5;         // hand center Y (normalized)
let portalSpread = 0.0;     // hand spread factor (fingers apart = bigger)
let portalHandPresent = false;
let portalRimParticles = [];
const PORTAL_RIM_N = 160;
for (let i = 0; i < PORTAL_RIM_N; i++) {
  portalRimParticles.push({
    angle: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.8,
    r: 0.6 + Math.random() * 2.2,
    offset: 0.95 + Math.random() * 0.1,
    phase: Math.random() * Math.PI * 2,
    cr: 0, cg: 0, cb: 0
  });
}
// Bright teal/white/gold frame colors
for (const p of portalRimParticles) {
  const t = Math.random();
  if (t < 0.40) { p.cr=120; p.cg=220; p.cb=255; }      // bright teal
  else if (t < 0.65) { p.cr=220; p.cg=235; p.cb=255; }  // near-white
  else if (t < 0.82) { p.cr=255; p.cg=210; p.cb=140; }  // warm gold
  else { p.cr=180; p.cg=255; p.cb=220; }                 // mint
}

// ========== PULSE STATE ==========
let pulseAudioCtx = null;
let pulseAnalyser = null;
let pulseMicStream = null;
let pulseFreqData = null;
let pulseBass = 0, pulseMid = 0, pulseHigh = 0, pulseVol = 0;
let pulseVolHistory = [];
const PULSE_VOL_HISTORY = 30;
let pulsePeak = false;
let pulseGesture = 'none'; // 'none','open','fist','peace','point'
let pulsePrevGesture = 'none';
let pulseGestureChanged = false;
let pulseHandLandmarks = []; // full 21-landmark arrays per hand
let pulseParticles = [];
const PULSE_N = 300;
let pulseBursts = [];
let pulseShockwaves = [];
let pulseBeams = [];
let pulseFlash = 0;
let pulseAudioReady = false;

for (let i = 0; i < PULSE_N; i++) {
  pulseParticles.push({
    x: 0, y: 0, vx: 0, vy: 0,
    r: 0, a: 0, life: 0, maxLife: 0,
    cr: 0, cg: 0, cb: 0,
    phase: Math.random() * Math.PI * 2,
    baseSpeed: 0
  });
}

function initPulseParticle(p, w, h) {
  p.x = Math.random() * w;
  p.y = Math.random() * h;
  p.baseSpeed = 0.3 + Math.random() * 1.5;
  const angle = Math.random() * TAU;
  p.vx = Math.cos(angle) * p.baseSpeed;
  p.vy = Math.sin(angle) * p.baseSpeed;
  p.r = 1 + Math.random() * 3;
  p.a = 0.3 + Math.random() * 0.5;
  p.life = 0;
  p.maxLife = 200 + Math.random() * 400;
  p.phase = Math.random() * TAU;
  p.cr = 255; p.cg = 180; p.cb = 100;
}

async function initPulseAudio() {
  if (pulseAudioReady) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    pulseMicStream = stream;
    pulseAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    pulseAnalyser = pulseAudioCtx.createAnalyser();
    pulseAnalyser.fftSize = 256;
    const source = pulseAudioCtx.createMediaStreamSource(stream);
    source.connect(pulseAnalyser);
    pulseFreqData = new Uint8Array(pulseAnalyser.frequencyBinCount);
    pulseVolHistory = [];
    pulseAudioReady = true;
    return true;
  } catch(e) {
    console.warn('Mic access denied:', e);
    return false;
  }
}

function updatePulseAudio() {
  if (!pulseAnalyser || !pulseFreqData) {
    pulseBass = 0; pulseMid = 0; pulseHigh = 0; pulseVol = 0; pulsePeak = false;
    return;
  }
  pulseAnalyser.getByteFrequencyData(pulseFreqData);
  const binCount = pulseFreqData.length;
  const nyquist = pulseAudioCtx.sampleRate / 2;
  const binWidth = nyquist / binCount;
  let bassSum = 0, bassN = 0;
  let midSum = 0, midN = 0;
  let highSum = 0, highN = 0;
  for (let i = 0; i < binCount; i++) {
    const freq = i * binWidth;
    const val = pulseFreqData[i] / 255;
    if (freq < 300) { bassSum += val; bassN++; }
    else if (freq < 2000) { midSum += val; midN++; }
    else { highSum += val; highN++; }
  }
  pulseBass = bassN > 0 ? bassSum / bassN : 0;
  pulseMid = midN > 0 ? midSum / midN : 0;
  pulseHigh = highN > 0 ? highSum / highN : 0;
  pulseVol = (pulseBass + pulseMid + pulseHigh) / 3;

  pulseVolHistory.push(pulseVol);
  if (pulseVolHistory.length > PULSE_VOL_HISTORY) pulseVolHistory.shift();
  const avgVol = pulseVolHistory.reduce((a, b) => a + b, 0) / pulseVolHistory.length;
  pulsePeak = pulseVol > avgVol * 2.5 && pulseVol > 0.15;
}

function detectPulseGesture() {
  pulsePrevGesture = pulseGesture;
  pulseGestureChanged = false;
  if (pulseHandLandmarks.length === 0) { pulseGesture = 'none'; return; }
  const lm = pulseHandLandmarks[0];
  if (!lm || lm.length < 21) { pulseGesture = 'none'; return; }

  const wrist = lm[0];
  const isRightHand = lm[17].x < lm[5].x;

  function fingerExtended(tipIdx, pipIdx) {
    return lm[tipIdx].y < lm[pipIdx].y;
  }
  function thumbExtended() {
    if (isRightHand) return lm[4].x < lm[3].x;
    return lm[4].x > lm[3].x;
  }

  const thumb = thumbExtended();
  const index = fingerExtended(8, 6);
  const middle = fingerExtended(12, 10);
  const ring = fingerExtended(16, 14);
  const pinky = fingerExtended(20, 18);

  const extended = [thumb, index, middle, ring, pinky];
  const count = extended.filter(Boolean).length;

  let newGesture = 'none';
  if (count >= 4) newGesture = 'open';
  else if (count <= 1 && !index && !middle && !ring && !pinky) newGesture = 'fist';
  else if (index && middle && !ring && !pinky) newGesture = 'peace';
  else if (index && !middle && !ring && !pinky) newGesture = 'point';

  if (newGesture !== 'none') pulseGesture = newGesture;
  pulseGestureChanged = (pulseGesture !== pulsePrevGesture && pulsePrevGesture !== 'none');
}

function detectClap() {
  if (pulseHandLandmarks.length < 2) return false;
  const h1 = pulseHandLandmarks[0];
  const h2 = pulseHandLandmarks[1];
  if (!h1 || !h2 || h1.length < 21 || h2.length < 21) return false;
  const dx = h1[9].x - h2[9].x;
  const dy = h1[9].y - h2[9].y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < 0.08;
}

// ========== REVEAL MASK SYSTEM ==========
let maskCanvas, maskCtx, maskTex;
let maskW, maskH;

function initMask() {
  maskW = Math.floor(W * 0.5);
  maskH = Math.floor(H * 0.5);
  if (!maskCanvas) {
    maskCanvas = document.createElement('canvas');
    maskCtx = maskCanvas.getContext('2d');
  }
  maskCanvas.width = maskW;
  maskCanvas.height = maskH;
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskW, maskH);

  if (maskTex) gl.deleteTexture(maskTex);
  maskTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function clearMask() {
  if (!maskCanvas) return;
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskW, maskH);
}

function paintMask() {
  if (currentMode !== 'reveal') return;

  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] < 0.5) continue;

    const cx = fingers[i*3] * maskW;
    const cy = fingers[i*3+1] * maskH;

    let px = cx, py = cy;
    if (prevFingers[i*3+2] > 0.5) {
      px = prevFingers[i*3] * maskW;
      py = prevFingers[i*3+1] * maskH;
    }

    const vel = Math.sqrt((cx-px)**2 + (cy-py)**2);
    const baseR = 30 + Math.min(vel * 1.5, 50);
    const opacity = 0.04 + Math.min(vel * 0.008, 0.12);

    const steps = Math.max(1, Math.floor(vel / 4));
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = px + (cx - px) * t;
      const y = py + (cy - py) * t;

      const grad = maskCtx.createRadialGradient(x, y, 0, x, y, baseR);
      grad.addColorStop(0, `rgba(255,255,255,${opacity})`);
      grad.addColorStop(0.4, `rgba(255,255,255,${opacity * 0.6})`);
      grad.addColorStop(0.7, `rgba(255,255,255,${opacity * 0.2})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      maskCtx.fillStyle = grad;
      maskCtx.beginPath();
      maskCtx.arc(x, y, baseR, 0, Math.PI * 2);
      maskCtx.fill();
    }
  }

  gl.activeTexture(gl.TEXTURE3);
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, maskCanvas);
}

// ========== STARLIGHT PARTICLE SYSTEM ==========
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let pW, pH;
let starlightOn = true;
const STAR_N = 500;
const TAU = Math.PI * 2;
const stars = [];
const handPts = [];

function initStar(s, scatter) {
  if (scatter) {
    s.x = Math.random() * pW;
    s.y = Math.random() * pH;
  } else {
    const edge = Math.random();
    if (edge < 0.45) {
      s.x = Math.random() * pW * 1.4 - pW * 0.1;
      s.y = -8 - Math.random() * 60;
    } else if (edge < 0.8) {
      s.x = pW + 8 + Math.random() * 60;
      s.y = Math.random() * pH * 0.65;
    } else {
      s.x = -8 - Math.random() * 40;
      s.y = Math.random() * pH * 0.4;
    }
  }
  const speed = 0.6 + Math.random() * 2.8;
  const angle = Math.PI * 0.58 + (Math.random() - 0.5) * 0.65;
  s.vx = Math.cos(angle) * speed;
  s.vy = Math.sin(angle) * speed;
  s.r = 0.4 + Math.random() * 2;
  if (Math.random() < 0.07) s.r = 3 + Math.random() * 2.5;
  s.a = 0.35 + Math.random() * 0.65;
  s.life = 0;
  s.maxLife = 90 + Math.random() * 280;
  s.tw = Math.random() * TAU;
  s.tf = 0.03 + Math.random() * 0.09;
  const t = Math.random();
  if (t < 0.45) { s.cr=255; s.cg=252; s.cb=240; }
  else if (t < 0.70) { s.cr=255; s.cg=228; s.cb=178; }
  else if (t < 0.88) { s.cr=255; s.cg=208; s.cb=148; }
  else { s.cr=215; s.cg=230; s.cb=255; }
}

for (let i = 0; i < STAR_N; i++) {
  const s = {};
  initStar(s, true);
  s.life = Math.random() * s.maxLife * 0.8;
  stars.push(s);
}

function resizeParticles() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  pW = Math.floor(window.innerWidth * dpr);
  pH = Math.floor(window.innerHeight * dpr);
  pCanvas.width = pW;
  pCanvas.height = pH;
  pCanvas.style.width = window.innerWidth + 'px';
  pCanvas.style.height = window.innerHeight + 'px';
  pCtx.fillStyle = '#000';
  pCtx.fillRect(0, 0, pW, pH);
}

function updateHandPts() {
  handPts.length = 0;
  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] > 0.5) {
      handPts.push({x: fingers[i*3], y: fingers[i*3+1]});
    }
  }
}

function updateStars() {
  if (Math.random() < 0.04) {
    const bx = Math.random() * pW;
    const by = Math.random() * pH * 0.55;
    let placed = 0;
    for (const s of stars) {
      if (placed >= 10) break;
      if (s.life > s.maxLife * 0.85 || s.x < -30 || s.x > pW+30 || s.y > pH+30) {
        s.x = bx + (Math.random()-0.5) * 25;
        s.y = by + (Math.random()-0.5) * 25;
        s.vx = (Math.random()-0.5) * 5;
        s.vy = (Math.random()-0.5) * 3 + 0.5;
        s.r = 1 + Math.random() * 3;
        s.a = 0.7 + Math.random() * 0.3;
        s.life = 0;
        s.maxLife = 25 + Math.random() * 50;
        placed++;
      }
    }
  }

  for (const h of handPts) {
    if (Math.random() < 0.35) {
      for (const s of stars) {
        if (s.life > s.maxLife * 0.9) {
          s.x = h.x * pW + (Math.random()-0.5) * 40;
          s.y = h.y * pH + (Math.random()-0.5) * 40;
          s.vx = (Math.random()-0.5) * 6;
          s.vy = (Math.random()-0.5) * 6;
          s.r = 0.8 + Math.random() * 2.5;
          s.a = 0.6 + Math.random() * 0.4;
          s.life = 0;
          s.maxLife = 20 + Math.random() * 40;
          s.cr=255; s.cg=240; s.cb=200;
          break;
        }
      }
    }
  }

  for (const s of stars) {
    for (const h of handPts) {
      const hx = h.x * pW, hy = h.y * pH;
      const dx = s.x - hx, dy = s.y - hy;
      const d2 = dx*dx + dy*dy;
      const R = 140;
      if (d2 < R*R && d2 > 4) {
        const d = Math.sqrt(d2);
        const f = (R - d) / R * 1.4;
        s.vx += (dx/d) * f;
        s.vy += (dy/d) * f;
      }
    }
    s.x += s.vx;
    s.y += s.vy;
    s.life++;
    s.vx += (-0.4 - s.vx) * 0.012;
    s.vy += (0.7 - s.vy) * 0.012;
    if (s.x < -60 || s.x > pW+60 || s.y > pH+60 || s.y < -60 || s.life > s.maxLife) {
      initStar(s, false);
    }
  }
}

function drawStars() {
  if (!starlightOn) {
    pCtx.globalCompositeOperation = 'source-over';
    pCtx.fillStyle = '#000';
    pCtx.fillRect(0, 0, pW, pH);
    return;
  }
  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = 'rgba(0,0,0,0.055)';
  pCtx.fillRect(0, 0, pW, pH);
  pCtx.globalCompositeOperation = 'lighter';
  for (const s of stars) {
    const fadeIn = Math.min(s.life / 15, 1);
    const fadeOut = s.life > s.maxLife - 35 ? Math.max(0, (s.maxLife - s.life) / 35) : 1;
    const twinkle = 0.6 + 0.4 * Math.sin(s.life * s.tf + s.tw);
    const a = s.a * fadeIn * fadeOut * twinkle;
    if (a < 0.015) continue;
    pCtx.beginPath();
    pCtx.arc(s.x, s.y, s.r, 0, TAU);
    pCtx.fillStyle = `rgba(${s.cr},${s.cg},${s.cb},${a})`;
    pCtx.fill();
    if (s.r > 1.8) {
      pCtx.beginPath();
      pCtx.arc(s.x, s.y, s.r * 3.5, 0, TAU);
      pCtx.fillStyle = `rgba(${s.cr},${s.cg},${s.cb},${a * 0.1})`;
      pCtx.fill();
    }
  }
}
// ========== END STARLIGHT ==========

// ========== KUNG FU: 一阳神指 PROJECTILE SYSTEM ==========
let kungfuOn = false;
const projectiles = [];
const sparks = [];
const fingerHistory = [];
const FLICK_THRESH = 12;

function detectFlick() {
  if (currentMode !== 'starlight') return;
  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] < 0.5) continue;
    if (!fingerHistory[i]) fingerHistory[i] = [];
    const h = fingerHistory[i];
    h.push({x: fingers[i*3] * pW, y: fingers[i*3+1] * pH, t: Date.now()});
    if (h.length > 8) h.shift();

    if (h.length >= 4) {
      const now = h[h.length-1];
      const prev = h[h.length-3];
      const old = h[0];
      const dt = now.t - prev.t;
      if (dt < 1) continue;
      const vx = (now.x - prev.x) / dt * 16;
      const vy = (now.y - prev.y) / dt * 16;
      const speed = Math.sqrt(vx*vx + vy*vy);

      const oldVx = (prev.x - old.x) / Math.max(1, prev.t - old.t) * 16;
      const oldVy = (prev.y - old.y) / Math.max(1, prev.t - old.t) * 16;
      const oldSpeed = Math.sqrt(oldVx*oldVx + oldVy*oldVy);

      if (speed > FLICK_THRESH && oldSpeed > FLICK_THRESH * 0.5) {
        const angle = Math.atan2(vy, vx);
        const power = Math.min(speed / FLICK_THRESH, 3);
        spawnProjectile(now.x, now.y, angle, power);
        h.length = 0;
      }
    }
  }
}

function spawnProjectile(x, y, angle, power) {
  const speed = 8 + power * 6;
  projectiles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 4 + power * 2,
    life: 0,
    maxLife: 60 + power * 20,
    power,
    trail: [{x, y}]
  });
  for (let j = 0; j < 12; j++) {
    const sa = angle + (Math.random()-0.5) * 1.5;
    const sv = 2 + Math.random() * 4;
    sparks.push({
      x, y,
      vx: Math.cos(sa)*sv, vy: Math.sin(sa)*sv,
      r: 0.5 + Math.random()*1.5, life: 0, maxLife: 15+Math.random()*20
    });
  }
}

function updateProjectiles() {
  for (let i = projectiles.length-1; i >= 0; i--) {
    const p = projectiles[i];
    p.trail.push({x:p.x, y:p.y});
    if (p.trail.length > 20) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.life++;
    for (let j = 0; j < 2; j++) {
      sparks.push({
        x: p.x + (Math.random()-0.5)*8,
        y: p.y + (Math.random()-0.5)*8,
        vx: (Math.random()-0.5)*3 - p.vx*0.1,
        vy: (Math.random()-0.5)*3 - p.vy*0.1,
        r: 0.5+Math.random()*1.2, life:0, maxLife:12+Math.random()*15
      });
    }
    if (p.life > p.maxLife || p.x<-50 || p.x>pW+50 || p.y<-50 || p.y>pH+50) {
      for (let j = 0; j < 25; j++) {
        const ba = Math.random()*TAU;
        const bv = 2+Math.random()*6;
        sparks.push({
          x:p.x, y:p.y,
          vx:Math.cos(ba)*bv, vy:Math.sin(ba)*bv,
          r:1+Math.random()*2, life:0, maxLife:20+Math.random()*25
        });
      }
      projectiles.splice(i, 1);
    }
  }
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.95; s.vy *= 0.95;
    s.vy += 0.1;
    s.life++;
    if (s.life > s.maxLife) sparks.splice(i, 1);
  }
}

function drawKungfu() {
  if (!kungfuOn) return;
  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = 'rgba(0,0,0,0.12)';
  pCtx.fillRect(0, 0, pW, pH);
  pCtx.globalCompositeOperation = 'lighter';

  for (const p of projectiles) {
    const a = Math.max(0, 1 - p.life/p.maxLife);
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ta = a * (t/p.trail.length) * 0.5;
        const tw = p.r * (t/p.trail.length) * 0.6;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t-1].x, p.trail[t-1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = `rgba(255,220,100,${ta})`;
        pCtx.lineWidth = tw;
        pCtx.stroke();
      }
      pCtx.beginPath();
      pCtx.moveTo(p.trail[p.trail.length-1].x, p.trail[p.trail.length-1].y);
      pCtx.lineTo(p.x, p.y);
      pCtx.strokeStyle = `rgba(255,230,130,${a*0.7})`;
      pCtx.lineWidth = p.r * 0.8;
      pCtx.stroke();
    }
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, TAU);
    pCtx.fillStyle = `rgba(255,250,220,${a})`;
    pCtx.fill();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r*3, 0, TAU);
    pCtx.fillStyle = `rgba(255,200,80,${a*0.2})`;
    pCtx.fill();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r*6, 0, TAU);
    pCtx.fillStyle = `rgba(255,150,50,${a*0.06})`;
    pCtx.fill();
  }

  for (const s of sparks) {
    const a = Math.max(0, 1 - s.life/s.maxLife);
    pCtx.beginPath();
    pCtx.arc(s.x, s.y, s.r, 0, TAU);
    pCtx.fillStyle = `rgba(255,${180+Math.random()*60|0},${60+Math.random()*80|0},${a})`;
    pCtx.fill();
  }
}

async function startCamera(facing) {

// --- Shader compilation ---
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}
function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  return p;
}

const quadVS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// --- Physics simulation shader (for Crystal mode) ---
const simFS = `
precision highp float;
uniform sampler2D u_prev;
uniform sampler2D u_curr;
uniform vec2 u_texel;
uniform float u_damping;
uniform vec3 u_fingers[10];
uniform vec3 u_prevFingers[10];
uniform float u_radius;
uniform float u_time;
varying vec2 v_uv;

float capsuleSDF(vec2 p, vec2 a, vec2 b){
  vec2 pa = p - a, ba = b - a;
  float h = clamp(dot(pa,ba)/dot(ba,ba), 0.0, 1.0);
  return length(pa - ba*h);
}

void main(){
  float prev = texture2D(u_prev, v_uv).r;
  float curr = texture2D(u_curr, v_uv).r;
  float avg = 0.0;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x, 0.0)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x, 0.0)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(0.0, -u_texel.y)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(0.0,  u_texel.y)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x, -u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x, -u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x,  u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x,  u_texel.y)).r * 0.05;
  float val = avg * 2.0 - prev;
  float ampFactor = 1.0 - smoothstep(0.0, 0.08, abs(val)) * 0.006;
  val *= u_damping * ampFactor;
  float aspect = u_texel.y / u_texel.x;
  vec2 uvAspect = vec2(v_uv.x, v_uv.y * aspect);
  float baseRadius = 0.028 * u_radius;
  float totalForce = 0.0;
  for(int i = 0; i < 10; i++){
    if(u_fingers[i].z < 0.5) continue;
    vec2 fa = vec2(u_fingers[i].x, u_fingers[i].y * aspect);
    vec2 fb = vec2(u_prevFingers[i].x, u_prevFingers[i].y * aspect);
    if(u_prevFingers[i].z < 0.5) fb = fa;
    float d = capsuleSDF(uvAspect, fa, fb);
    float vel = length(fa - fb);
    float velGate = smoothstep(0.003, 0.015, vel);
    float force = velGate * (0.6 + clamp(vel * 12.0, 0.0, 1.2));
    if(d < baseRadius){
      float strength = smoothstep(baseRadius, baseRadius * 0.3, d) * force;
      totalForce += strength;
    }
  }
  totalForce = clamp(totalForce, 0.0, 1.8);
  val += totalForce * 0.15;
  gl_FragColor = vec4(val, 0.0, 0.0, 1.0);
}`;

// --- Render shader (Crystal + Reveal modes) ---
const renderFS = `
precision highp float;
uniform sampler2D u_sim;
uniform sampler2D u_camera;
uniform sampler2D u_mask;
uniform vec2 u_texel;
uniform vec2 u_simTexel;
uniform float u_intensity;
uniform float u_revealMode;
uniform float u_aspect;
uniform float u_mirror;
uniform float u_time;
varying vec2 v_uv;

void main(){
  vec2 camUV = vec2(mix(v_uv.x, 1.0 - v_uv.x, u_mirror), v_uv.y);
  vec3 cleanCam = texture2D(u_camera, camUV).rgb;

  // ---- REVEAL MODE ----
  if(u_revealMode > 0.5){
    float mask = texture2D(u_mask, v_uv).r;

    // Edge detection on mask for glow
    float maskL = texture2D(u_mask, v_uv + vec2(-u_texel.x * 3.0, 0.0)).r;
    float maskR = texture2D(u_mask, v_uv + vec2( u_texel.x * 3.0, 0.0)).r;
    float maskT = texture2D(u_mask, v_uv + vec2(0.0, -u_texel.y * 3.0)).r;
    float maskB = texture2D(u_mask, v_uv + vec2(0.0,  u_texel.y * 3.0)).r;
    float edgeStrength = abs(maskR - maskL) + abs(maskB - maskT);

    // Background: sunset beach scene with flowers
    float vy = v_uv.y;
    // Sky gradient (golden sunset)
    vec3 skyTop = vec3(0.15, 0.25, 0.55);
    vec3 skyMid = vec3(0.85, 0.45, 0.25);
    vec3 skyLow = vec3(0.95, 0.65, 0.35);
    vec3 sky = mix(skyLow, skyMid, smoothstep(0.3, 0.55, vy));
    sky = mix(sky, skyTop, smoothstep(0.55, 0.85, vy));
    // Sun glow
    float sunDist = length(vec2(v_uv.x - 0.5, vy - 0.42) * vec2(1.0, 1.5));
    sky += vec3(1.0, 0.8, 0.4) * exp(-sunDist * 4.0) * 0.6;
    // Ground (sand + flowers)
    vec3 sand = vec3(0.85, 0.72, 0.50);
    vec3 grass = vec3(0.25, 0.45, 0.18);
    float groundMix = smoothstep(0.35, 0.25, vy);
    vec3 ground = mix(sand, grass, smoothstep(0.15, 0.28, vy));
    // Flower dots
    vec2 fp = v_uv * vec2(20.0, 15.0);
    float flowerSeed = fract(sin(dot(floor(fp), vec2(127.1, 311.7))) * 43758.5453);
    float petal = smoothstep(0.35, 0.15, length(fract(fp) - 0.5));
    vec3 flowerCol = mix(vec3(0.95,0.4,0.55), vec3(0.95,0.85,0.3), flowerSeed);
    flowerCol = mix(flowerCol, vec3(0.85,0.5,0.9), step(0.7, flowerSeed));
    ground = mix(ground, flowerCol, petal * step(0.35, flowerSeed) * groundMix);
    // Combine
    vec3 bg = mix(ground, sky, smoothstep(0.22, 0.38, vy));
    // Warm ambient light
    bg += vec3(0.06, 0.03, 0.01);
    // Gentle sway animation
    bg += vec3(0.03, 0.02, 0.0) * sin(u_time * 0.5 + v_uv.x * 3.0) * groundMix;
    bg = clamp(bg, 0.0, 1.0);

    // Smooth reveal blend
    float reveal = smoothstep(0.05, 0.55, mask);

    // Edge glow (warm golden line at tear boundary)
    float edgeMask = smoothstep(0.08, 0.20, mask) * (1.0 - smoothstep(0.35, 0.60, mask));
    float edgeGlow = edgeMask * (0.6 + edgeStrength * 3.0);
    vec3 glowColor = vec3(1.0, 0.92, 0.75);

    // Slight chromatic split at edges
    float chromaShift = edgeMask * 0.006;
    float rr = texture2D(u_camera, camUV + vec2(chromaShift, 0.0)).r;
    float bb = texture2D(u_camera, camUV - vec2(chromaShift, 0.0)).b;
    vec3 edgeCam = vec3(rr, cleanCam.g, bb);

    vec3 frontLayer = mix(cleanCam, edgeCam, edgeMask);
    vec3 color = mix(frontLayer, bg, reveal);
    color += glowColor * edgeGlow * 0.5;

    // Subtle sparkle at edges
    float sparkle = fract(sin(dot(v_uv * 400.0 + u_time * 2.0, vec2(12.9898, 78.233))) * 43758.5453);
    color += vec3(1.0, 0.95, 0.85) * sparkle * edgeMask * 0.25;

    gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
    return;
  }

  // ---- CRYSTAL MODE ----
  float data = texture2D(u_sim, v_uv).r;
  float tl = texture2D(u_sim, v_uv + vec2(-u_simTexel.x, -u_simTexel.y)).r;
  float tc = texture2D(u_sim, v_uv + vec2(0.0, -u_simTexel.y)).r;
  float tr = texture2D(u_sim, v_uv + vec2( u_simTexel.x, -u_simTexel.y)).r;
  float ml = texture2D(u_sim, v_uv + vec2(-u_simTexel.x, 0.0)).r;
  float mr = texture2D(u_sim, v_uv + vec2( u_simTexel.x, 0.0)).r;
  float bl = texture2D(u_sim, v_uv + vec2(-u_simTexel.x,  u_simTexel.y)).r;
  float bc = texture2D(u_sim, v_uv + vec2(0.0,  u_simTexel.y)).r;
  float br = texture2D(u_sim, v_uv + vec2( u_simTexel.x,  u_simTexel.y)).r;
  float dx = (tr + 2.0*mr + br) - (tl + 2.0*ml + bl);
  float dy = (bl + 2.0*bc + br) - (tl + 2.0*tc + tr);
  vec2 grad = vec2(dx, dy);
  float gradLen = length(grad);
  float lap = (tc + bc + ml + mr) * 0.25 - data;
  vec2 aspectVec = vec2(1.0, u_aspect);

  vec2 facetGrad = floor(grad * 18.0) / 18.0;
  vec2 crystalOffset = facetGrad * 0.4 * u_intensity * aspectVec;
  float edgeDiff = length(facetGrad - vec2(
    floor(texture2D(u_sim, v_uv + vec2(u_simTexel.x,0.0)).r * 18.0)/18.0,
    floor(texture2D(u_sim, v_uv + vec2(0.0,u_simTexel.y)).r * 18.0)/18.0
  ));
  float crystalEdge = smoothstep(0.0, 0.02, edgeDiff);

  vec2 refractOffset = grad * 0.35 * u_intensity * aspectVec;
  vec2 lensOffset = vec2(0.0);
  if(gradLen > 0.001) lensOffset = normalize(grad) * lap * 0.10 * u_intensity * aspectVec;
  vec2 totalOffset = refractOffset + lensOffset;
  float dispersion = 0.005;
  vec2 finalOffset = crystalOffset;

  vec2 uvR = camUV + finalOffset * (1.0 + dispersion);
  vec2 uvG = camUV + finalOffset;
  vec2 uvB = camUV + finalOffset * (1.0 - dispersion);
  vec2 softDir = normalize(finalOffset + 0.0001) * u_texel * 1.5;
  float r = (texture2D(u_camera, uvR).r + texture2D(u_camera, uvR + softDir).r + texture2D(u_camera, uvR - softDir).r) / 3.0;
  float g = (texture2D(u_camera, uvG).g + texture2D(u_camera, uvG + softDir).g + texture2D(u_camera, uvG - softDir).g) / 3.0;
  float b = (texture2D(u_camera, uvB).b + texture2D(u_camera, uvB + softDir).b + texture2D(u_camera, uvB - softDir).b) / 3.0;
  vec3 color = vec3(r, g, b);

  float brightness = 1.0 + clamp(data * 2.2, -0.38, 0.45);
  color *= brightness * 0.5 + 0.5;
  color += vec3(0.75, 0.90, 1.0) * crystalEdge * 0.4;
  float facetBright = 1.0 + dot(facetGrad, vec2(0.3, 0.5)) * 0.3;
  color *= facetBright;

  vec3 normal = normalize(vec3(-grad.x, -grad.y, 0.8 / (u_intensity + 0.01)));
  vec3 halfDir = normalize(normalize(vec3(0.4, 0.7, 1.0)) + vec3(0.0, 0.0, 1.0));
  float NdotH = max(dot(normal, halfDir), 0.0);
  color += vec3(pow(NdotH, 180.0) * 2.2 + pow(NdotH, 28.0) * 0.35) * 0.7;

  float activity = smoothstep(0.001, 0.012, abs(data) + gradLen * 0.3);
  color = mix(cleanCam, color, activity);

  gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
}`;

// --- Portal shader ---
const portalFS = `
precision highp float;
uniform sampler2D u_camera;
uniform float u_mirror;
uniform float u_time;
uniform float u_portalOpen;
uniform vec2 u_portalCenter;
uniform float u_portalSpread;
uniform vec2 u_resolution;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0;
  float amp = 0.5;
  for (int i = 0; i < 4; i++) {
    v += amp * noise(p);
    p *= 2.1;
    amp *= 0.5;
  }
  return v;
}

varying vec2 v_uv;

void main() {
  vec2 camUV = vec2(mix(v_uv.x, 1.0 - v_uv.x, u_mirror), v_uv.y);
  vec3 cam = texture2D(u_camera, camUV).rgb;

  if (u_portalOpen < 0.005) {
    gl_FragColor = vec4(cam, 1.0);
    return;
  }

  float aspect = u_resolution.x / u_resolution.y;
  vec2 uv = v_uv;
  vec2 center = u_portalCenter;

  // Door-shaped portal: wide and tall
  float baseRx = 0.18 + u_portalSpread * 0.08;
  float baseRy = baseRx * 2.0;
  float rx = baseRx * u_portalOpen;
  float ry = baseRy * u_portalOpen;

  // Superellipse for rounded-rectangle door shape (n=3.5)
  vec2 d = (uv - center) * vec2(aspect, 1.0);
  vec2 nd = abs(d) / vec2(rx * aspect, ry);
  float sn = 3.5;
  float superDist = pow(pow(nd.x, sn) + pow(nd.y, sn), 1.0 / sn);

  // Arch top: compress the top portion to round the doorway
  float archBias = smoothstep(0.0, 0.8, -d.y / max(ry, 0.001)) * 0.15;
  superDist -= archBias;

  // Sharp frame edges
  float frameWidth = 0.06;
  float innerEdge = 1.0;
  float insideMask = 1.0 - smoothstep(innerEdge - 0.02, innerEdge + 0.01, superDist);
  float frameMask = smoothstep(innerEdge - 0.03, innerEdge, superDist) *
                    (1.0 - smoothstep(innerEdge + frameWidth, innerEdge + frameWidth + 0.04, superDist));
  float outerGlowMask = smoothstep(innerEdge + frameWidth + 0.25, innerEdge + frameWidth, superDist) *
                        (1.0 - frameMask) * (1.0 - insideMask);

  // --- Bright ethereal world inside the portal ---
  float t = u_time * 0.2;
  vec2 portalUV = (uv - center) / vec2(rx / aspect, ry) * 0.5 + 0.5;

  // Perspective depth: converging lines
  float depthY = (uv.y - center.y + ry) / (2.0 * ry);
  float perspective = 1.0 + depthY * 2.0;

  // Warm luminous base — golden hour forest
  float n1 = fbm(vec2(portalUV.x * 3.0, portalUV.y * perspective * 2.0) + vec2(t * 0.15, t * 0.08));
  float n2 = fbm(vec2(portalUV.x * 5.0, portalUV.y * perspective * 4.0) - vec2(t * 0.1, -t * 0.12));
  float n3 = fbm(vec2(portalUV.x * 2.0 + t * 0.05, portalUV.y * 1.5 + t * 0.03));

  // Golden light gradient from top
  vec3 world = mix(vec3(0.95, 0.75, 0.45), vec3(0.4, 0.55, 0.7), depthY * 0.8);

  // Warm volumetric light rays from above
  float rayAngle = portalUV.x * 6.28 + t * 0.3;
  float rays = pow(max(0.0, sin(rayAngle * 3.0 + n1 * 2.0)), 4.0) * (1.0 - depthY);
  world += vec3(1.0, 0.85, 0.5) * rays * 0.35;

  // Misty depth layers
  world = mix(world, vec3(0.7, 0.8, 0.95), smoothstep(0.3, 0.9, n1) * 0.4);
  world += vec3(0.3, 0.45, 0.2) * smoothstep(0.4, 0.7, n2) * 0.3 * depthY;

  // Floating dust motes
  float moteNoise = hash(floor(uv * u_resolution * 0.15) + floor(t * 0.3));
  float moteBright = smoothstep(0.97, 0.995, moteNoise);
  float moteFloat = 0.5 + 0.5 * sin(moteNoise * 50.0 + u_time * 1.5);
  world += vec3(1.0, 0.95, 0.8) * moteBright * moteFloat * 0.8;

  // Soft radial glow from center
  float cdist = length((uv - center) / vec2(rx / aspect * 2.0, ry * 2.0));
  world += vec3(0.2, 0.15, 0.05) * exp(-cdist * 3.0);

  // Overall brightness boost
  world *= 1.1;

  // --- Bright solid frame with energy flow ---
  float angle = atan(d.y, d.x);
  float energyFlow = 0.5 + 0.5 * sin(angle * 8.0 - u_time * 3.0 + n3 * 4.0);
  float framePulse = 0.85 + 0.15 * sin(u_time * 2.0);

  // Teal-to-white frame (bright, clearly visible)
  vec3 frameColor = mix(vec3(0.4, 0.85, 1.0), vec3(0.95, 0.95, 1.0), energyFlow * 0.6);
  frameColor *= framePulse;
  float frameIntensity = frameMask * 1.2 * u_portalOpen;

  // Inner edge highlight: thin bright line
  float innerLine = smoothstep(innerEdge + 0.005, innerEdge, superDist) *
                    smoothstep(innerEdge - 0.04, innerEdge - 0.015, superDist);
  vec3 innerGlow = vec3(0.9, 0.95, 1.0) * innerLine * 1.5 * u_portalOpen;

  // Outer halo
  vec3 haloColor = vec3(0.3, 0.6, 0.8) * outerGlowMask * 0.2 * u_portalOpen;

  // Chromatic aberration near frame
  float chromaShift = frameMask * 0.006 * u_portalOpen;
  float camR = texture2D(u_camera, camUV + vec2(chromaShift, 0.0)).r;
  float camB = texture2D(u_camera, camUV - vec2(chromaShift, 0.0)).b;
  vec3 camChroma = vec3(camR, cam.g, camB);
  vec3 outsideCam = mix(cam, camChroma, frameMask + outerGlowMask);

  // --- Final composition ---
  vec3 color = outsideCam;
  color = mix(color, world, insideMask);
  color += frameColor * frameIntensity;
  color += innerGlow;
  color += haloColor;

  gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
}`;

let portalProg, portalU;
function initPortalShader() {
  portalProg = createProgram(quadVS, portalFS);
  portalU = getUniforms(portalProg, [
    'u_camera', 'u_mirror', 'u_time',
    'u_portalOpen', 'u_portalCenter', 'u_portalSpread', 'u_resolution'
  ]);
}

// ========== PULSE SHADER ==========
const pulseFS = `
precision highp float;
uniform sampler2D u_camera;
uniform float u_mirror;
uniform float u_time;
uniform float u_bass;
uniform float u_mid;
uniform float u_high;
uniform float u_vol;
uniform vec2 u_resolution;
varying vec2 v_uv;
void main(){
  vec2 camUV = vec2(mix(v_uv.x, 1.0 - v_uv.x, u_mirror), v_uv.y);
  vec3 cam = texture2D(u_camera, camUV).rgb;

  // Audio-reactive vignette
  vec2 center = v_uv - 0.5;
  float aspect = u_resolution.x / u_resolution.y;
  center.x *= aspect;
  float dist = length(center);
  float bassPulse = u_bass * 0.35;
  float vignetteRadius = 0.65 + bassPulse * 0.2;
  float vignette = 1.0 - smoothstep(vignetteRadius, vignetteRadius + 0.45, dist);
  cam *= vignette;

  // Warm color grade on bass hits
  float warmth = u_bass * 0.25;
  cam.r += warmth * 0.12;
  cam.g += warmth * 0.04;
  cam.b -= warmth * 0.06;

  // Slight energy tint from overall volume
  float energy = u_vol * 0.15;
  cam += vec3(energy * 0.05, energy * 0.02, energy * 0.08);

  // Subtle scan line for texture
  float scanline = 0.97 + 0.03 * sin(v_uv.y * u_resolution.y * 0.5 + u_time * 2.0);
  cam *= scanline;

  gl_FragColor = vec4(clamp(cam, 0.0, 1.0), 1.0);
}`;

let pulseProg, pulseU;
function initPulseShader() {
  pulseProg = createProgram(quadVS, pulseFS);
  pulseU = getUniforms(pulseProg, [
    'u_camera', 'u_mirror', 'u_time',
    'u_bass', 'u_mid', 'u_high', 'u_vol', 'u_resolution'
  ]);
}

// ========== PORTAL 2D OVERLAY (rim particles along door frame) ==========

// Superellipse point for door frame
function superEllipsePoint(angle, rx, ry, n) {
  const ca = Math.cos(angle), sa = Math.sin(angle);
  const x = Math.sign(ca) * rx * Math.pow(Math.abs(ca), 2.0 / n);
  const y = Math.sign(sa) * ry * Math.pow(Math.abs(sa), 2.0 / n);
  return [x, y];
}

function updatePortalState() {
  let handCount = 0;
  let cx = 0, cy = 0;
  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] > 0.5) {
      const fx = fingers[i*3], fy = fingers[i*3+1];
      cx += fx; cy += fy;
      if (fx < minX) minX = fx;
      if (fx > maxX) maxX = fx;
      if (fy < minY) minY = fy;
      if (fy > maxY) maxY = fy;
      handCount++;
    }
  }
  if (handCount > 0) {
    portalHandPresent = true;
    const tcx = cx / handCount;
    const tcy = cy / handCount;
    portalCx += (tcx - portalCx) * 0.12;
    portalCy += (tcy - portalCy) * 0.12;
    const spread = Math.max(maxX - minX, maxY - minY);
    const targetSpread = Math.min(spread * 2.5, 1.0);
    portalSpread += (targetSpread - portalSpread) * 0.1;
    portalOpen = Math.min(1.0, portalOpen + 0.035);
  } else {
    portalHandPresent = false;
    portalOpen = Math.max(0.0, portalOpen - 0.02);
    portalSpread *= 0.95;
  }
}

function drawPortalRim() {
  if (currentMode !== 'portal') return;
  if (portalOpen < 0.01) {
    pCtx.globalCompositeOperation = 'source-over';
    pCtx.fillStyle = '#000';
    pCtx.fillRect(0, 0, pW, pH);
    return;
  }

  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = 'rgba(0,0,0,0.15)';
  pCtx.fillRect(0, 0, pW, pH);
  pCtx.globalCompositeOperation = 'lighter';

  const cx = portalCx * pW;
  const cy = portalCy * pH;
  const baseRx = (0.18 + portalSpread * 0.08) * pW * portalOpen;
  const baseRy = baseRx * 2.0;

  for (const p of portalRimParticles) {
    p.angle += p.speed * 0.02;
    const wobble = Math.sin(p.angle * 2.0 + p.phase + time * 1.5) * 0.04;

    // Particles trace the superellipse door frame
    const [sx, sy] = superEllipsePoint(p.angle, baseRx, baseRy, 3.5);
    const r = 1.0 + wobble;
    const px = cx + sx * r;
    const py = cy + sy * r;

    const fadeIn = Math.min(portalOpen * 3.0, 1.0);
    const a = (0.35 + 0.45 * Math.sin(p.angle * 2.0 + time * 2.5)) * fadeIn;
    if (a < 0.02) continue;

    pCtx.beginPath();
    pCtx.arc(px, py, p.r * portalOpen * 1.2, 0, TAU);
    pCtx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${a})`;
    pCtx.fill();

    if (p.r > 1.0) {
      pCtx.beginPath();
      pCtx.arc(px, py, p.r * 3.5 * portalOpen, 0, TAU);
      pCtx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${a * 0.15})`;
      pCtx.fill();
    }
  }
}
// ========== END PORTAL ==========

// ========== PULSE PARTICLE SYSTEM ==========
function spawnPulseBurst(cx, cy, count, speedMul) {
  for (let i = 0; i < count; i++) {
    const angle = TAU * i / count + (Math.random() - 0.5) * 0.3;
    const speed = (3 + Math.random() * 8) * speedMul;
    const energy = pulseBass + pulseMid * 0.5;
    const r = Math.random();
    let cr, cg, cb;
    if (energy > 0.5) { cr = 100 + r * 80; cg = 180 + r * 75; cb = 255; }
    else { cr = 255; cg = 140 + r * 80; cb = 60 + r * 60; }
    pulseBursts.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 1.5 + Math.random() * 3,
      a: 0.8 + Math.random() * 0.2,
      life: 0, maxLife: 30 + Math.random() * 40,
      cr, cg, cb
    });
  }
}

function spawnPulseShockwave(cx, cy) {
  const energy = pulseBass + pulseMid * 0.5;
  const r = Math.random();
  let cr, cg, cb;
  if (energy > 0.4) { cr = 120; cg = 200; cb = 255; }
  else { cr = 255; cg = 160 + r * 60; cb = 80; }
  pulseShockwaves.push({
    x: cx, y: cy,
    radius: 5, maxRadius: 120 + pulseBass * 80,
    life: 0, maxLife: 35,
    lineWidth: 3 + pulseBass * 4,
    cr, cg, cb
  });
}

function spawnPulseBeams(tips) {
  for (const tip of tips) {
    pulseBeams.push({
      x: tip.x, y: tip.y,
      angle: -Math.PI / 2 + (Math.random() - 0.5) * 0.3,
      length: 0, maxLength: 200 + pulseMid * 150,
      life: 0, maxLife: 25,
      width: 2 + pulseBass * 3,
      cr: 180, cg: 120, cb: 255
    });
  }
}

function updatePulseEffects() {
  const handCenters = [];
  for (const lm of pulseHandLandmarks) {
    if (!lm || lm.length < 21) continue;
    let sx = lm[9].x;
    if (facingMode === 'user') sx = 1.0 - sx;
    handCenters.push({x: sx * pW, y: lm[9].y * pH});
  }

  // Gesture-triggered effects
  if (pulseGestureChanged && handCenters.length > 0) {
    const hc = handCenters[0];
    if (pulseGesture === 'open') {
      spawnPulseBurst(hc.x, hc.y, 40, 1.0);
    } else if (pulseGesture === 'fist') {
      spawnPulseShockwave(hc.x, hc.y);
    } else if (pulseGesture === 'peace') {
      const lm = pulseHandLandmarks[0];
      if (lm && lm.length >= 21) {
        let ix = lm[8].x, mx = lm[12].x;
        if (facingMode === 'user') { ix = 1.0 - ix; mx = 1.0 - mx; }
        spawnPulseBeams([
          {x: ix * pW, y: lm[8].y * pH},
          {x: mx * pW, y: lm[12].y * pH}
        ]);
      }
    }
  }

  // Clap detection
  if (detectClap()) {
    pulseFlash = 1.0;
    const cx = pW * 0.5, cy = pH * 0.5;
    spawnPulseBurst(cx, cy, 80, 2.0);
    spawnPulseShockwave(cx, cy);
  }

  // Peak (clap/hit) audio burst at hand positions
  if (pulsePeak && handCenters.length > 0) {
    for (const hc of handCenters) {
      spawnPulseBurst(hc.x, hc.y, 20, 1.5);
    }
  }

  // Update ambient particles
  for (const p of pulseParticles) {
    if (p.life >= p.maxLife || p.x < -20 || p.x > pW + 20 || p.y < -20 || p.y > pH + 20) {
      initPulseParticle(p, pW, pH);
    }
    // Size pulsates with bass
    const sizeScale = 1 + pulseBass * 2;
    // Speed varies with mid
    const speedScale = 0.5 + pulseMid * 3;

    // Attract/repel near hand
    for (const hc of handCenters) {
      const dx = p.x - hc.x, dy = p.y - hc.y;
      const d2 = dx * dx + dy * dy;
      const R = 180;
      if (d2 < R * R && d2 > 4) {
        const d = Math.sqrt(d2);
        const force = (R - d) / R;
        const dir = pulseBass > 0.4 ? 1 : -0.5;
        p.vx += (dx / d) * force * dir * 2;
        p.vy += (dy / d) * force * dir * 2;
      }
    }

    p.vx += Math.sin(p.phase + time * 0.5) * 0.05 * speedScale;
    p.vy += Math.cos(p.phase + time * 0.7) * 0.05 * speedScale;
    p.x += p.vx * speedScale;
    p.y += p.vy * speedScale;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life++;

    // Color shifts with audio energy
    const energy = pulseBass + pulseMid + pulseHigh;
    if (energy > 1.0) {
      p.cr = 100 + energy * 40; p.cg = 160 + energy * 30; p.cb = 255;
    } else {
      p.cr = 255; p.cg = 160 + energy * 50; p.cb = 80 + energy * 40;
    }
    p.currentR = p.r * sizeScale;
  }

  // Update bursts
  for (let i = pulseBursts.length - 1; i >= 0; i--) {
    const b = pulseBursts[i];
    b.x += b.vx; b.y += b.vy;
    b.vx *= 0.94; b.vy *= 0.94;
    b.vy += 0.15;
    b.life++;
    if (b.life > b.maxLife) pulseBursts.splice(i, 1);
  }

  // Update shockwaves
  for (let i = pulseShockwaves.length - 1; i >= 0; i--) {
    const s = pulseShockwaves[i];
    const t = s.life / s.maxLife;
    s.radius = s.maxRadius * (1 - Math.pow(1 - t, 3));
    s.life++;
    if (s.life > s.maxLife) pulseShockwaves.splice(i, 1);
  }

  // Update beams
  for (let i = pulseBeams.length - 1; i >= 0; i--) {
    const b = pulseBeams[i];
    const t = b.life / b.maxLife;
    b.length = b.maxLength * Math.min(t * 3, 1);
    b.life++;
    if (b.life > b.maxLife) pulseBeams.splice(i, 1);
  }

  // Decay flash
  pulseFlash *= 0.85;
}

function drawPulseOverlay() {
  if (currentMode !== 'pulse') return;
  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = 'rgba(0,0,0,0.08)';
  pCtx.fillRect(0, 0, pW, pH);

  // Flash
  if (pulseFlash > 0.05) {
    pCtx.globalCompositeOperation = 'lighter';
    pCtx.fillStyle = `rgba(255,255,255,${pulseFlash * 0.4})`;
    pCtx.fillRect(0, 0, pW, pH);
  }

  pCtx.globalCompositeOperation = 'lighter';

  // Ambient particles
  for (const p of pulseParticles) {
    const fadeIn = Math.min(p.life / 20, 1);
    const fadeOut = p.life > p.maxLife - 40 ? Math.max(0, (p.maxLife - p.life) / 40) : 1;
    const twinkle = 0.7 + 0.3 * Math.sin(p.life * 0.05 + p.phase);
    const a = p.a * fadeIn * fadeOut * twinkle;
    if (a < 0.02) continue;
    const r = p.currentR || p.r;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, r, 0, TAU);
    pCtx.fillStyle = `rgba(${p.cr|0},${p.cg|0},${p.cb|0},${a})`;
    pCtx.fill();
    if (r > 2) {
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, r * 3, 0, TAU);
      pCtx.fillStyle = `rgba(${p.cr|0},${p.cg|0},${p.cb|0},${a * 0.08})`;
      pCtx.fill();
    }
  }

  // Bursts
  for (const b of pulseBursts) {
    const a = Math.max(0, 1 - b.life / b.maxLife) * b.a;
    if (a < 0.02) continue;
    pCtx.beginPath();
    pCtx.arc(b.x, b.y, b.r, 0, TAU);
    pCtx.fillStyle = `rgba(${b.cr|0},${b.cg|0},${b.cb|0},${a})`;
    pCtx.fill();
    pCtx.beginPath();
    pCtx.arc(b.x, b.y, b.r * 2.5, 0, TAU);
    pCtx.fillStyle = `rgba(${b.cr|0},${b.cg|0},${b.cb|0},${a * 0.15})`;
    pCtx.fill();
  }

  // Shockwaves
  for (const s of pulseShockwaves) {
    const a = Math.max(0, 1 - s.life / s.maxLife);
    if (a < 0.02) continue;
    pCtx.beginPath();
    pCtx.arc(s.x, s.y, s.radius, 0, TAU);
    pCtx.strokeStyle = `rgba(${s.cr},${s.cg},${s.cb},${a * 0.7})`;
    pCtx.lineWidth = s.lineWidth * a;
    pCtx.stroke();
    // Outer glow ring
    pCtx.beginPath();
    pCtx.arc(s.x, s.y, s.radius, 0, TAU);
    pCtx.strokeStyle = `rgba(${s.cr},${s.cg},${s.cb},${a * 0.15})`;
    pCtx.lineWidth = s.lineWidth * a * 4;
    pCtx.stroke();
  }

  // Beams
  for (const b of pulseBeams) {
    const a = Math.max(0, 1 - b.life / b.maxLife);
    if (a < 0.02) continue;
    const ex = b.x + Math.cos(b.angle) * b.length;
    const ey = b.y + Math.sin(b.angle) * b.length;
    const grad = pCtx.createLinearGradient(b.x, b.y, ex, ey);
    grad.addColorStop(0, `rgba(${b.cr},${b.cg},${b.cb},${a * 0.9})`);
    grad.addColorStop(0.6, `rgba(${b.cr},${b.cg},${b.cb},${a * 0.4})`);
    grad.addColorStop(1, `rgba(${b.cr},${b.cg},${b.cb},0)`);
    pCtx.beginPath();
    pCtx.moveTo(b.x, b.y);
    pCtx.lineTo(ex, ey);
    pCtx.strokeStyle = grad;
    pCtx.lineWidth = b.width * a;
    pCtx.stroke();
    // Core glow
    pCtx.beginPath();
    pCtx.moveTo(b.x, b.y);
    pCtx.lineTo(ex, ey);
    pCtx.strokeStyle = `rgba(255,255,255,${a * 0.3})`;
    pCtx.lineWidth = b.width * a * 0.3;
    pCtx.stroke();
  }
}
// ========== END PULSE ==========

// --- GL setup ---
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const simProg = createProgram(quadVS, simFS);
const renderProg = createProgram(quadVS, renderFS);
initPortalShader();
initPulseShader();

function getUniforms(prog, names) {
  const u = {};
  names.forEach(n => u[n] = gl.getUniformLocation(prog, n));
  return u;
}
const simU = getUniforms(simProg, ['u_prev','u_curr','u_texel','u_damping','u_fingers','u_prevFingers','u_radius','u_time']);
const renU = getUniforms(renderProg, ['u_sim','u_camera','u_mask','u_texel','u_simTexel','u_intensity','u_revealMode','u_aspect','u_mirror','u_time']);

function setupAttrib(prog) {
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

// --- FBO creation ---
const texType = extFloat ? gl.FLOAT : (extHalf ? extHalf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE);

function createFBO(w, h) {
  const fb = gl.createFramebuffer();
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, texType, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {fb, tex, w, h};
}

let simFBOs = [];
let camTex;

function initFBOs() {
  W = canvas.width; H = canvas.height;
  simW = Math.floor(W * 0.75); simH = Math.floor(H * 0.75);
  simFBOs = [createFBO(simW, simH), createFBO(simW, simH), createFBO(simW, simH)];
  if (camTex) gl.deleteTexture(camTex);
  camTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, camTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  initFBOs();
  initMask();
  resizeParticles();
}
window.addEventListener('resize', resize);

// --- Touch fallback ---
const touchPoints = [];
canvas.addEventListener('touchstart', e=>{e.preventDefault(); updateTouch(e)}, {passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault(); updateTouch(e)}, {passive:false});
canvas.addEventListener('touchend', e=>{e.preventDefault(); touchPoints.length=0; updateFingersFromTouch()}, {passive:false});
canvas.addEventListener('mousedown', e=>{touchPoints[0]={x:e.clientX/window.innerWidth, y:e.clientY/window.innerHeight}; updateFingersFromTouch()});
canvas.addEventListener('mousemove', e=>{if(e.buttons){touchPoints[0]={x:e.clientX/window.innerWidth, y:e.clientY/window.innerHeight}; updateFingersFromTouch()}});
canvas.addEventListener('mouseup', ()=>{touchPoints.length=0; updateFingersFromTouch()});

function updateTouch(e) {
  touchPoints.length = 0;
  for (let i=0; i<e.touches.length && i<10; i++) {
    touchPoints.push({x:e.touches[i].clientX/window.innerWidth, y:e.touches[i].clientY/window.innerHeight});
  }
  updateFingersFromTouch();
}
function updateFingersFromTouch() {
  prevFingers.set(fingers);
  fingers.fill(0);
  for (let i=0; i<touchPoints.length && i<10; i++) {
    fingers[i*3] = touchPoints[i].x;
    fingers[i*3+1] = touchPoints[i].y;
    fingers[i*3+2] = 1.0;
  }
}

// --- MediaPipe Hands ---
async function loadMediaPipe() {
  try {
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js';
      s.onload = r;
      document.head.appendChild(s);
    });
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js';
      s.onload = r;
      document.head.appendChild(s);
    });
    const hands = new window.Hands({locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
    });
    hands.setOptions({maxNumHands:2, modelComplexity:0, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
    hands.onResults(onHandResults);
    const cam = new window.Camera(video, {
      onFrame: async () => { await hands.send({image:video}); },
      width:640, height:480
    });
    cam.start();
    handsReady = true;
    document.getElementById('status').textContent = 'Hand tracking active';
    setTimeout(() => { document.getElementById('status').style.opacity = '0'; }, 3000);
  } catch(e) {
    console.warn('MediaPipe failed, using touch:', e);
    document.getElementById('status').textContent = 'Touch mode (tap screen to interact)';
    setTimeout(() => { document.getElementById('status').style.opacity = '0'; }, 5000);
  }
}

const FINGERTIPS = [4, 8, 12, 16, 20];

function onHandResults(results) {
  prevFingers.set(fingers);
  fingers.fill(0);
  if (!results.multiHandLandmarks) {
    if (currentMode === 'pulse') { pulseHandLandmarks = []; detectPulseGesture(); }
    return;
  }
  let idx = 0;
  for (let h = 0; h < results.multiHandLandmarks.length && h < 2; h++) {
    const lm = results.multiHandLandmarks[h];
    for (let f = 0; f < FINGERTIPS.length; f++) {
      const tip = lm[FINGERTIPS[f]];
      let sx = tip.x;
      if (facingMode === 'user') sx = 1.0 - sx;
      fingers[idx*3] = sx;
      fingers[idx*3+1] = tip.y;
      fingers[idx*3+2] = 1.0;
      idx++;
      if (idx >= 10) break;
    }
    if (idx >= 10) break;
  }
  // Capture full landmarks for Pulse gesture recognition
  if (currentMode === 'pulse') {
    pulseHandLandmarks = [];
    for (let h = 0; h < results.multiHandLandmarks.length && h < 2; h++) {
      pulseHandLandmarks.push(results.multiHandLandmarks[h].map(l => ({x:l.x, y:l.y, z:l.z})));
    }
    detectPulseGesture();
  }
}

// --- Render loop ---
let time = 0;
function render() {
  requestAnimationFrame(render);
  if (!videoReady) return;
  time += 0.016;

  // Update camera texture
  gl.activeTexture(gl.TEXTURE2);
  gl.bindTexture(gl.TEXTURE_2D, camTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  try { gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video); } catch(e){}
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);

  // Physics simulation (Crystal mode only)
  if (currentMode === 'crystal') {
    gl.useProgram(simProg);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    setupAttrib(simProg);
    gl.viewport(0, 0, simW, simH);
    for (let iter = 0; iter < 2; iter++) {
      const prevFBO = simFBOs[0], currFBO = simFBOs[1], nextFBO = simFBOs[2];
      gl.bindFramebuffer(gl.FRAMEBUFFER, nextFBO.fb);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, prevFBO.tex);
      gl.uniform1i(simU.u_prev, 0);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, currFBO.tex);
      gl.uniform1i(simU.u_curr, 1);
      gl.uniform2f(simU.u_texel, 1.0/simW, 1.0/simH);
      gl.uniform1f(simU.u_damping, 0.975);
      gl.uniform1f(simU.u_radius, 1.0);
      gl.uniform1f(simU.u_time, time);
      if (iter === 0) {
        gl.uniform3fv(simU.u_fingers, fingers);
        gl.uniform3fv(simU.u_prevFingers, prevFingers);
      } else {
        gl.uniform3fv(simU.u_fingers, new Float32Array(30));
        gl.uniform3fv(simU.u_prevFingers, new Float32Array(30));
      }
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      simFBOs[0] = currFBO; simFBOs[1] = nextFBO; simFBOs[2] = prevFBO;
    }
  }

  // Render pass
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);

  if (currentMode === 'portal') {
    // Portal mode: use portal shader
    updatePortalState();
    gl.useProgram(portalProg);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    setupAttrib(portalProg);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, camTex);
    gl.uniform1i(portalU.u_camera, 0);

    gl.uniform1f(portalU.u_mirror, facingMode === 'user' ? 1.0 : 0.0);
    gl.uniform1f(portalU.u_time, time);
    gl.uniform1f(portalU.u_portalOpen, portalOpen);
    gl.uniform2f(portalU.u_portalCenter, portalCx, portalCy);
    gl.uniform1f(portalU.u_portalSpread, portalSpread);
    gl.uniform2f(portalU.u_resolution, W, H);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else if (currentMode === 'pulse') {
    // Pulse mode: audio-reactive shader
    updatePulseAudio();
    gl.useProgram(pulseProg);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    setupAttrib(pulseProg);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, camTex);
    gl.uniform1i(pulseU.u_camera, 0);

    gl.uniform1f(pulseU.u_mirror, facingMode === 'user' ? 1.0 : 0.0);
    gl.uniform1f(pulseU.u_time, time);
    gl.uniform1f(pulseU.u_bass, pulseBass);
    gl.uniform1f(pulseU.u_mid, pulseMid);
    gl.uniform1f(pulseU.u_high, pulseHigh);
    gl.uniform1f(pulseU.u_vol, pulseVol);
    gl.uniform2f(pulseU.u_resolution, W, H);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else {
    // Crystal / Starlight / Reveal: use render shader
    gl.useProgram(renderProg);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    setupAttrib(renderProg);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, simFBOs[1].tex);
    gl.uniform1i(renU.u_sim, 0);

    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, camTex);
    gl.uniform1i(renU.u_camera, 1);

    gl.activeTexture(gl.TEXTURE3);
    gl.bindTexture(gl.TEXTURE_2D, maskTex);
    gl.uniform1i(renU.u_mask, 3);

    gl.uniform2f(renU.u_texel, 1.0/W, 1.0/H);
    gl.uniform2f(renU.u_simTexel, 1.0/simW, 1.0/simH);
    gl.uniform1f(renU.u_intensity, 1.0);
    gl.uniform1f(renU.u_revealMode, 0.0);
    gl.uniform1f(renU.u_aspect, H/W);
    gl.uniform1f(renU.u_mirror, facingMode === 'user' ? 1.0 : 0.0);
    gl.uniform1f(renU.u_time, time);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // Particle overlays
  updateHandPts();
  if (currentMode === 'starlight') {
    detectFlick(); updateProjectiles(); drawKungfu();
  } else if (currentMode === 'portal') {
    drawPortalRim();
  } else if (currentMode === 'pulse') {
    updatePulseEffects();
    drawPulseOverlay();
  } else {
    pCtx.globalCompositeOperation = 'source-over';
    pCtx.fillStyle = '#000';
    pCtx.fillRect(0, 0, pW, pH);
  }
}

// --- UI ---
const btnCrystal = document.getElementById('btn-crystal');
const btnStar = document.getElementById('btn-star');
const btnPortal = document.getElementById('btn-portal');
const btnPulse = document.getElementById('btn-pulse');
const hintEl = document.getElementById('hint');

const hints = {
  crystal: 'Touch to create waves',
  starlight: 'Flick to shoot ✨',
  portal: 'Move your hand to open a portal',
  pulse: 'Let the music move you'
};

function clearSimFBOs() {
  for (const fbo of simFBOs) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo.fb);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
  }
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

function setMode(m) {
  currentMode = m;
  starlightOn = (m === 'starlight');
  kungfuOn = (m === 'starlight');
  btnCrystal.classList.toggle('active', m === 'crystal');
  btnStar.classList.toggle('active', m === 'starlight');
  btnPortal.classList.toggle('active', m === 'portal');
  btnPulse.classList.toggle('active', m === 'pulse');
  hintEl.textContent = hints[m] || '';
  hintEl.style.opacity = '1';
  setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
  if (m !== 'crystal') clearSimFBOs();
  if (m === 'starlight') { projectiles.length = 0; sparks.length = 0; }
  // Clean up portal state when switching away
  if (m !== 'portal') {
    portalOpen = 0.0;
    portalSpread = 0.0;
    portalHandPresent = false;
  }
  // Clean up pulse state when switching away
  if (m !== 'pulse') {
    pulseGesture = 'none';
    pulsePrevGesture = 'none';
    pulseHandLandmarks = [];
    pulseBursts.length = 0;
    pulseShockwaves.length = 0;
    pulseBeams.length = 0;
    pulseFlash = 0;
  }
  // Initialize pulse particles on first entry
  if (m === 'pulse') {
    for (const p of pulseParticles) initPulseParticle(p, pW, pH);
  }
  // Clear particle canvas on mode switch to prevent residual overlap
  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = '#000';
  pCtx.fillRect(0, 0, pW, pH);
}

btnCrystal.onclick = () => setMode('crystal');
btnStar.onclick = () => setMode('starlight');
btnPortal.onclick = () => setMode('portal');
btnPulse.onclick = async () => {
  const ok = await initPulseAudio();
  if (!ok) {
    hintEl.textContent = 'Microphone access needed for Pulse mode';
    hintEl.style.opacity = '1';
    setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
    return;
  }
  if (pulseAudioCtx && pulseAudioCtx.state === 'suspended') {
    await pulseAudioCtx.resume();
  }
  setMode('pulse');
};

document.getElementById('flip-btn').onclick = async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  await startCamera(facingMode);
};

// --- Init ---
async function init() {
  resize();
  await startCamera(facingMode);
  document.getElementById('loading').classList.add('hide');
  setTimeout(() => { hintEl.style.opacity = '0'; }, 4000);
  loadMediaPipe();
  render();
}
init();
</script>
</body>
