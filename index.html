<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Airpond</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;width:100%;height:100%}
#particles{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:screen}
#ui{position:fixed;bottom:env(safe-area-inset-bottom,20px);bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:10}
#ui button{padding:8px 20px;border:none;border-radius:20px;font-size:14px;cursor:pointer;
  background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);transition:background .2s;white-space:nowrap}
#ui button.active{background:rgba(100,180,255,0.4)}
#ui button:active{background:rgba(100,180,255,0.6)}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;color:#fff;font-family:system-ui;z-index:100;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
#loading p{margin-top:12px;font-size:14px;opacity:.7}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.top-btn{position:fixed;top:20px;z-index:10;width:40px;height:40px;
  border:none;border-radius:50%;background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;
  transition:background .2s}
#flip-btn{right:20px}
#reset-btn{right:68px;display:none}
#hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.6);font-size:13px;font-family:system-ui;z-index:10;
  pointer-events:none;transition:opacity .5s}
#status{position:fixed;top:20px;left:20px;z-index:10;font-size:11px;font-family:system-ui;
  color:rgba(255,255,255,0.5);pointer-events:none;transition:opacity 1s}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Loading camera &amp; hand tracking...</p></div>
<div id="status"></div>
<canvas id="c"></canvas>
<canvas id="particles"></canvas>
<button id="reset-btn" class="top-btn" title="Reset">&#x21BA;</button>
<button id="flip-btn" class="top-btn" title="Flip Camera">&#x1F504;</button>
<div id="hint">Raise your hand to reveal &#x2728;</div>
<div id="ui">
  <button id="btn-reveal" class="active">Reveal</button>
  <button id="btn-crystal">Crystal</button>
  <button id="btn-star">Starlight</button>
</div>

<script type="module">
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {alpha:false, antialias:false, preserveDrawingBuffer:false});
if(!gl){alert('WebGL not supported');throw new Error('no webgl')}

const extFloat = gl.getExtension('OES_texture_float');
const extHalf = gl.getExtension('OES_texture_half_float');
const extLinF = gl.getExtension('OES_texture_float_linear');
const extLinH = gl.getExtension('OES_texture_half_float_linear');

let W, H, simW, simH;
let currentMode = 'reveal'; // 'reveal' or 'crystal'
let facingMode = 'user';
let videoReady = false;
let handsReady = false;

const fingers = new Float32Array(30);
const prevFingers = new Float32Array(30);

// ========== REVEAL MASK SYSTEM ==========
let maskCanvas, maskCtx, maskTex;
let maskW, maskH;

function initMask() {
  maskW = Math.floor(W * 0.5);
  maskH = Math.floor(H * 0.5);
  if (!maskCanvas) {
    maskCanvas = document.createElement('canvas');
    maskCtx = maskCanvas.getContext('2d');
  }
  maskCanvas.width = maskW;
  maskCanvas.height = maskH;
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskW, maskH);

  if (maskTex) gl.deleteTexture(maskTex);
  maskTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function clearMask() {
  if (!maskCanvas) return;
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskW, maskH);
}

function paintMask() {
  if (currentMode !== 'reveal') return;

  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] < 0.5) continue;

    const cx = fingers[i*3] * maskW;
    const cy = fingers[i*3+1] * maskH;

    let px = cx, py = cy;
    if (prevFingers[i*3+2] > 0.5) {
      px = prevFingers[i*3] * maskW;
      py = prevFingers[i*3+1] * maskH;
    }

    const vel = Math.sqrt((cx-px)**2 + (cy-py)**2);
    const baseR = 30 + Math.min(vel * 1.5, 50);
    const opacity = 0.04 + Math.min(vel * 0.008, 0.12);

    const steps = Math.max(1, Math.floor(vel / 4));
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = px + (cx - px) * t;
      const y = py + (cy - py) * t;

      const grad = maskCtx.createRadialGradient(x, y, 0, x, y, baseR);
      grad.addColorStop(0, `rgba(255,255,255,${opacity})`);
      grad.addColorStop(0.4, `rgba(255,255,255,${opacity * 0.6})`);
      grad.addColorStop(0.7, `rgba(255,255,255,${opacity * 0.2})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      maskCtx.fillStyle = grad;
      maskCtx.beginPath();
      maskCtx.arc(x, y, baseR, 0, Math.PI * 2);
      maskCtx.fill();
    }
  }

  gl.activeTexture(gl.TEXTURE3);
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, maskCanvas);
}

// ========== STARLIGHT PARTICLE SYSTEM ==========
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let pW, pH;
let starlightOn = true;
const STAR_N = 500;
const TAU = Math.PI * 2;
const stars = [];
const handPts = [];

function initStar(s, scatter) {
  if (scatter) {
    s.x = Math.random() * pW;
    s.y = Math.random() * pH;
  } else {
    const edge = Math.random();
    if (edge < 0.45) {
      s.x = Math.random() * pW * 1.4 - pW * 0.1;
      s.y = -8 - Math.random() * 60;
    } else if (edge < 0.8) {
      s.x = pW + 8 + Math.random() * 60;
      s.y = Math.random() * pH * 0.65;
    } else {
      s.x = -8 - Math.random() * 40;
      s.y = Math.random() * pH * 0.4;
    }
  }
  const speed = 0.6 + Math.random() * 2.8;
  const angle = Math.PI * 0.58 + (Math.random() - 0.5) * 0.65;
  s.vx = Math.cos(angle) * speed;
  s.vy = Math.sin(angle) * speed;
  s.r = 0.4 + Math.random() * 2;
  if (Math.random() < 0.07) s.r = 3 + Math.random() * 2.5;
  s.a = 0.35 + Math.random() * 0.65;
  s.life = 0;
  s.maxLife = 90 + Math.random() * 280;
  s.tw = Math.random() * TAU;
  s.tf = 0.03 + Math.random() * 0.09;
  const t = Math.random();
  if (t < 0.45) { s.cr=255; s.cg=252; s.cb=240; }
  else if (t < 0.70) { s.cr=255; s.cg=228; s.cb=178; }
  else if (t < 0.88) { s.cr=255; s.cg=208; s.cb=148; }
  else { s.cr=215; s.cg=230; s.cb=255; }
}

for (let i = 0; i < STAR_N; i++) {
  const s = {};
  initStar(s, true);
  s.life = Math.random() * s.maxLife * 0.8;
  stars.push(s);
}

function resizeParticles() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  pW = Math.floor(window.innerWidth * dpr);
  pH = Math.floor(window.innerHeight * dpr);
  pCanvas.width = pW;
  pCanvas.height = pH;
  pCanvas.style.width = window.innerWidth + 'px';
  pCanvas.style.height = window.innerHeight + 'px';
  pCtx.fillStyle = '#000';
  pCtx.fillRect(0, 0, pW, pH);
}

function updateHandPts() {
  handPts.length = 0;
  for (let i = 0; i < 10; i++) {
    if (fingers[i*3+2] > 0.5) {
      handPts.push({x: fingers[i*3], y: fingers[i*3+1]});
    }
  }
}

function updateStars() {
  if (Math.random() < 0.04) {
    const bx = Math.random() * pW;
    const by = Math.random() * pH * 0.55;
    let placed = 0;
    for (const s of stars) {
      if (placed >= 10) break;
      if (s.life > s.maxLife * 0.85 || s.x < -30 || s.x > pW+30 || s.y > pH+30) {
        s.x = bx + (Math.random()-0.5) * 25;
        s.y = by + (Math.random()-0.5) * 25;
        s.vx = (Math.random()-0.5) * 5;
        s.vy = (Math.random()-0.5) * 3 + 0.5;
        s.r = 1 + Math.random() * 3;
        s.a = 0.7 + Math.random() * 0.3;
        s.life = 0;
        s.maxLife = 25 + Math.random() * 50;
        placed++;
      }
    }
  }

  for (const h of handPts) {
    if (Math.random() < 0.35) {
      for (const s of stars) {
        if (s.life > s.maxLife * 0.9) {
          s.x = h.x * pW + (Math.random()-0.5) * 40;
          s.y = h.y * pH + (Math.random()-0.5) * 40;
          s.vx = (Math.random()-0.5) * 6;
          s.vy = (Math.random()-0.5) * 6;
          s.r = 0.8 + Math.random() * 2.5;
          s.a = 0.6 + Math.random() * 0.4;
          s.life = 0;
          s.maxLife = 20 + Math.random() * 40;
          s.cr=255; s.cg=240; s.cb=200;
          break;
        }
      }
    }
  }

  for (const s of stars) {
    for (const h of handPts) {
      const hx = h.x * pW, hy = h.y * pH;
      const dx = s.x - hx, dy = s.y - hy;
      const d2 = dx*dx + dy*dy;
      const R = 140;
      if (d2 < R*R && d2 > 4) {
        const d = Math.sqrt(d2);
        const f = (R - d) / R * 1.4;
        s.vx += (dx/d) * f;
        s.vy += (dy/d) * f;
      }
    }
    s.x += s.vx;
    s.y += s.vy;
    s.life++;
    s.vx += (-0.4 - s.vx) * 0.012;
    s.vy += (0.7 - s.vy) * 0.012;
    if (s.x < -60 || s.x > pW+60 || s.y > pH+60 || s.y < -60 || s.life > s.maxLife) {
      initStar(s, false);
    }
  }
}

function drawStars() {
  if (!starlightOn) {
    pCtx.globalCompositeOperation = 'source-over';
    pCtx.fillStyle = '#000';
    pCtx.fillRect(0, 0, pW, pH);
    return;
  }
  pCtx.globalCompositeOperation = 'source-over';
  pCtx.fillStyle = 'rgba(0,0,0,0.055)';
  pCtx.fillRect(0, 0, pW, pH);
  pCtx.globalCompositeOperation = 'lighter';
  for (const s of stars) {
    const fadeIn = Math.min(s.life / 15, 1);
    const fadeOut = s.life > s.maxLife - 35 ? Math.max(0, (s.maxLife - s.life) / 35) : 1;
    const twinkle = 0.6 + 0.4 * Math.sin(s.life * s.tf + s.tw);
    const a = s.a * fadeIn * fadeOut * twinkle;
    if (a < 0.015) continue;
    pCtx.beginPath();
    pCtx.arc(s.x, s.y, s.r, 0, TAU);
    pCtx.fillStyle = `rgba(${s.cr},${s.cg},${s.cb},${a})`;
    pCtx.fill();
    if (s.r > 1.8) {
      pCtx.beginPath();
      pCtx.arc(s.x, s.y, s.r * 3.5, 0, TAU);
      pCtx.fillStyle = `rgba(${s.cr},${s.cg},${s.cb},${a * 0.1})`;
      pCtx.fill();
    }
  }
}
// ========== END STARLIGHT ==========

// --- Video setup ---
const video = document.createElement('video');
video.setAttribute('playsinline','');
video.setAttribute('autoplay','');
video.muted = true;

async function startCamera(facing) {
  if (video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing, width:{ideal:1280}, height:{ideal:720}},
    audio:false
  });
  video.srcObject = stream;
  await video.play();
  videoReady = true;
}

// --- Shader compilation ---
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}
function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  return p;
}

const quadVS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// --- Physics simulation shader (for Crystal mode) ---
const simFS = `
precision highp float;
uniform sampler2D u_prev;
uniform sampler2D u_curr;
uniform vec2 u_texel;
uniform float u_damping;
uniform vec3 u_fingers[10];
uniform vec3 u_prevFingers[10];
uniform float u_radius;
uniform float u_time;
varying vec2 v_uv;

float capsuleSDF(vec2 p, vec2 a, vec2 b){
  vec2 pa = p - a, ba = b - a;
  float h = clamp(dot(pa,ba)/dot(ba,ba), 0.0, 1.0);
  return length(pa - ba*h);
}

void main(){
  float prev = texture2D(u_prev, v_uv).r;
  float curr = texture2D(u_curr, v_uv).r;
  float avg = 0.0;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x, 0.0)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x, 0.0)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(0.0, -u_texel.y)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(0.0,  u_texel.y)).r * 0.2;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x, -u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x, -u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2(-u_texel.x,  u_texel.y)).r * 0.05;
  avg += texture2D(u_curr, v_uv + vec2( u_texel.x,  u_texel.y)).r * 0.05;
  float val = avg * 2.0 - prev;
  float ampFactor = 1.0 - smoothstep(0.0, 0.08, abs(val)) * 0.006;
  val *= u_damping * ampFactor;
  float aspect = u_texel.y / u_texel.x;
  vec2 uvAspect = vec2(v_uv.x, v_uv.y * aspect);
  float baseRadius = 0.028 * u_radius;
  float totalForce = 0.0;
  for(int i = 0; i < 10; i++){
    if(u_fingers[i].z < 0.5) continue;
    vec2 fa = vec2(u_fingers[i].x, u_fingers[i].y * aspect);
    vec2 fb = vec2(u_prevFingers[i].x, u_prevFingers[i].y * aspect);
    if(u_prevFingers[i].z < 0.5) fb = fa;
    float d = capsuleSDF(uvAspect, fa, fb);
    float vel = length(fa - fb);
    float velGate = smoothstep(0.003, 0.015, vel);
    float force = velGate * (0.6 + clamp(vel * 12.0, 0.0, 1.2));
    if(d < baseRadius){
      float strength = smoothstep(baseRadius, baseRadius * 0.3, d) * force;
      totalForce += strength;
    }
  }
  totalForce = clamp(totalForce, 0.0, 1.8);
  val += totalForce * 0.15;
  gl_FragColor = vec4(val, 0.0, 0.0, 1.0);
}`;

// --- Render shader (Crystal + Reveal modes) ---
const renderFS = `
precision highp float;
uniform sampler2D u_sim;
uniform sampler2D u_camera;
uniform sampler2D u_mask;
uniform vec2 u_texel;
uniform vec2 u_simTexel;
uniform float u_intensity;
uniform float u_revealMode;
uniform float u_aspect;
uniform float u_mirror;
uniform float u_time;
varying vec2 v_uv;

void main(){
  vec2 camUV = vec2(mix(v_uv.x, 1.0 - v_uv.x, u_mirror), v_uv.y);
  vec3 cleanCam = texture2D(u_camera, camUV).rgb;

  // ---- REVEAL MODE ----
  if(u_revealMode > 0.5){
    float mask = texture2D(u_mask, v_uv).r;

    // Edge detection on mask for glow
    float maskL = texture2D(u_mask, v_uv + vec2(-u_texel.x * 3.0, 0.0)).r;
    float maskR = texture2D(u_mask, v_uv + vec2( u_texel.x * 3.0, 0.0)).r;
    float maskT = texture2D(u_mask, v_uv + vec2(0.0, -u_texel.y * 3.0)).r;
    float maskB = texture2D(u_mask, v_uv + vec2(0.0,  u_texel.y * 3.0)).r;
    float edgeStrength = abs(maskR - maskL) + abs(maskB - maskT);

    // Background: ethereal processed camera
    vec2 bgOff1 = vec2(0.008, 0.0);
    vec2 bgOff2 = vec2(0.0, 0.008);
    vec3 blurred = (
      texture2D(u_camera, camUV + bgOff1).rgb +
      texture2D(u_camera, camUV - bgOff1).rgb +
      texture2D(u_camera, camUV + bgOff2).rgb +
      texture2D(u_camera, camUV - bgOff2).rgb +
      texture2D(u_camera, camUV + bgOff1 + bgOff2).rgb +
      texture2D(u_camera, camUV - bgOff1 - bgOff2).rgb
    ) / 6.0;
    vec3 bg = mix(cleanCam, blurred, 0.55);
    bg = pow(bg, vec3(0.75));
    bg *= vec3(1.15, 0.92, 0.75);
    float lum = dot(bg, vec3(0.299, 0.587, 0.114));
    bg = mix(vec3(lum), bg, 1.4);
    bg += vec3(0.04, 0.02, 0.0);
    bg = clamp(bg, 0.0, 1.0);

    // Smooth reveal blend
    float reveal = smoothstep(0.05, 0.55, mask);

    // Edge glow (warm golden line at tear boundary)
    float edgeMask = smoothstep(0.08, 0.20, mask) * (1.0 - smoothstep(0.35, 0.60, mask));
    float edgeGlow = edgeMask * (0.6 + edgeStrength * 3.0);
    vec3 glowColor = vec3(1.0, 0.92, 0.75);

    // Slight chromatic split at edges
    float chromaShift = edgeMask * 0.006;
    float rr = texture2D(u_camera, camUV + vec2(chromaShift, 0.0)).r;
    float bb = texture2D(u_camera, camUV - vec2(chromaShift, 0.0)).b;
    vec3 edgeCam = vec3(rr, cleanCam.g, bb);

    vec3 frontLayer = mix(cleanCam, edgeCam, edgeMask);
    vec3 color = mix(frontLayer, bg, reveal);
    color += glowColor * edgeGlow * 0.5;

    // Subtle sparkle at edges
    float sparkle = fract(sin(dot(v_uv * 400.0 + u_time * 2.0, vec2(12.9898, 78.233))) * 43758.5453);
    color += vec3(1.0, 0.95, 0.85) * sparkle * edgeMask * 0.25;

    gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
    return;
  }

  // ---- CRYSTAL MODE ----
  float data = texture2D(u_sim, v_uv).r;
  float tl = texture2D(u_sim, v_uv + vec2(-u_simTexel.x, -u_simTexel.y)).r;
  float tc = texture2D(u_sim, v_uv + vec2(0.0, -u_simTexel.y)).r;
  float tr = texture2D(u_sim, v_uv + vec2( u_simTexel.x, -u_simTexel.y)).r;
  float ml = texture2D(u_sim, v_uv + vec2(-u_simTexel.x, 0.0)).r;
  float mr = texture2D(u_sim, v_uv + vec2( u_simTexel.x, 0.0)).r;
  float bl = texture2D(u_sim, v_uv + vec2(-u_simTexel.x,  u_simTexel.y)).r;
  float bc = texture2D(u_sim, v_uv + vec2(0.0,  u_simTexel.y)).r;
  float br = texture2D(u_sim, v_uv + vec2( u_simTexel.x,  u_simTexel.y)).r;
  float dx = (tr + 2.0*mr + br) - (tl + 2.0*ml + bl);
  float dy = (bl + 2.0*bc + br) - (tl + 2.0*tc + tr);
  vec2 grad = vec2(dx, dy);
  float gradLen = length(grad);
  float lap = (tc + bc + ml + mr) * 0.25 - data;
  vec2 aspectVec = vec2(1.0, u_aspect);

  vec2 facetGrad = floor(grad * 18.0) / 18.0;
  vec2 crystalOffset = facetGrad * 0.4 * u_intensity * aspectVec;
  float edgeDiff = length(facetGrad - vec2(
    floor(texture2D(u_sim, v_uv + vec2(u_simTexel.x,0.0)).r * 18.0)/18.0,
    floor(texture2D(u_sim, v_uv + vec2(0.0,u_simTexel.y)).r * 18.0)/18.0
  ));
  float crystalEdge = smoothstep(0.0, 0.02, edgeDiff);

  vec2 refractOffset = grad * 0.35 * u_intensity * aspectVec;
  vec2 lensOffset = vec2(0.0);
  if(gradLen > 0.001) lensOffset = normalize(grad) * lap * 0.10 * u_intensity * aspectVec;
  vec2 totalOffset = refractOffset + lensOffset;
  float dispersion = 0.005;
  vec2 finalOffset = crystalOffset;

  vec2 uvR = camUV + finalOffset * (1.0 + dispersion);
  vec2 uvG = camUV + finalOffset;
  vec2 uvB = camUV + finalOffset * (1.0 - dispersion);
  vec2 softDir = normalize(finalOffset + 0.0001) * u_texel * 1.5;
  float r = (texture2D(u_camera, uvR).r + texture2D(u_camera, uvR + softDir).r + texture2D(u_camera, uvR - softDir).r) / 3.0;
  float g = (texture2D(u_camera, uvG).g + texture2D(u_camera, uvG + softDir).g + texture2D(u_camera, uvG - softDir).g) / 3.0;
  float b = (texture2D(u_camera, uvB).b + texture2D(u_camera, uvB + softDir).b + texture2D(u_camera, uvB - softDir).b) / 3.0;
  vec3 color = vec3(r, g, b);

  float brightness = 1.0 + clamp(data * 2.2, -0.38, 0.45);
  color *= brightness * 0.5 + 0.5;
  color += vec3(0.75, 0.90, 1.0) * crystalEdge * 0.4;
  float facetBright = 1.0 + dot(facetGrad, vec2(0.3, 0.5)) * 0.3;
  color *= facetBright;

  vec3 normal = normalize(vec3(-grad.x, -grad.y, 0.8 / (u_intensity + 0.01)));
  vec3 halfDir = normalize(normalize(vec3(0.4, 0.7, 1.0)) + vec3(0.0, 0.0, 1.0));
  float NdotH = max(dot(normal, halfDir), 0.0);
  color += vec3(pow(NdotH, 180.0) * 2.2 + pow(NdotH, 28.0) * 0.35) * 0.7;

  float activity = smoothstep(0.001, 0.012, abs(data) + gradLen * 0.3);
  color = mix(cleanCam, color, activity);

  gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
}`;

// --- GL setup ---
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const simProg = createProgram(quadVS, simFS);
const renderProg = createProgram(quadVS, renderFS);

function getUniforms(prog, names) {
  const u = {};
  names.forEach(n => u[n] = gl.getUniformLocation(prog, n));
  return u;
}
const simU = getUniforms(simProg, ['u_prev','u_curr','u_texel','u_damping','u_fingers','u_prevFingers','u_radius','u_time']);
const renU = getUniforms(renderProg, ['u_sim','u_camera','u_mask','u_texel','u_simTexel','u_intensity','u_revealMode','u_aspect','u_mirror','u_time']);

function setupAttrib(prog) {
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

// --- FBO creation ---
const texType = extFloat ? gl.FLOAT : (extHalf ? extHalf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE);

function createFBO(w, h) {
  const fb = gl.createFramebuffer();
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, texType, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {fb, tex, w, h};
}

let simFBOs = [];
let camTex;

function initFBOs() {
  W = canvas.width; H = canvas.height;
  simW = Math.floor(W * 0.75); simH = Math.floor(H * 0.75);
  simFBOs = [createFBO(simW, simH), createFBO(simW, simH), createFBO(simW, simH)];
  if (camTex) gl.deleteTexture(camTex);
  camTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, camTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  initFBOs();
  initMask();
  resizeParticles();
}
window.addEventListener('resize', resize);

// --- Touch fallback ---
const touchPoints = [];
canvas.addEventListener('touchstart', e=>{e.preventDefault(); updateTouch(e)}, {passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault(); updateTouch(e)}, {passive:false});
canvas.addEventListener('touchend', e=>{e.preventDefault(); touchPoints.length=0; updateFingersFromTouch()}, {passive:false});
canvas.addEventListener('mousedown', e=>{touchPoints[0]={x:e.clientX/window.innerWidth, y:e.clientY/window.innerHeight}; updateFingersFromTouch()});
canvas.addEventListener('mousemove', e=>{if(e.buttons){touchPoints[0]={x:e.clientX/window.innerWidth, y:e.clientY/window.innerHeight}; updateFingersFromTouch()}});
canvas.addEventListener('mouseup', ()=>{touchPoints.length=0; updateFingersFromTouch()});

function updateTouch(e) {
  touchPoints.length = 0;
  for (let i=0; i<e.touches.length && i<10; i++) {
    touchPoints.push({x:e.touches[i].clientX/window.innerWidth, y:e.touches[i].clientY/window.innerHeight});
  }
  updateFingersFromTouch();
}
function updateFingersFromTouch() {
  prevFingers.set(fingers);
  fingers.fill(0);
  for (let i=0; i<touchPoints.length && i<10; i++) {
    fingers[i*3] = touchPoints[i].x;
    fingers[i*3+1] = touchPoints[i].y;
    fingers[i*3+2] = 1.0;
  }
}

// --- MediaPipe Hands ---
async function loadMediaPipe() {
  try {
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js';
      s.onload = r;
      document.head.appendChild(s);
    });
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js';
      s.onload = r;
      document.head.appendChild(s);
    });
    const hands = new window.Hands({locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
    });
    hands.setOptions({maxNumHands:2, modelComplexity:0, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
    hands.onResults(onHandResults);
    const cam = new window.Camera(video, {
      onFrame: async () => { await hands.send({image:video}); },
      width:640, height:480
    });
    cam.start();
    handsReady = true;
    document.getElementById('status').textContent = 'Hand tracking active';
    setTimeout(() => { document.getElementById('status').style.opacity = '0'; }, 3000);
  } catch(e) {
    console.warn('MediaPipe failed, using touch:', e);
    document.getElementById('status').textContent = 'Touch mode (tap screen to interact)';
    setTimeout(() => { document.getElementById('status').style.opacity = '0'; }, 5000);
  }
}

const FINGERTIPS = [4, 8, 12, 16, 20];

function onHandResults(results) {
  prevFingers.set(fingers);
  fingers.fill(0);
  if (!results.multiHandLandmarks) return;
  let idx = 0;
  for (let h = 0; h < results.multiHandLandmarks.length && h < 2; h++) {
    const lm = results.multiHandLandmarks[h];
    for (let f = 0; f < FINGERTIPS.length; f++) {
      const tip = lm[FINGERTIPS[f]];
      let sx = tip.x;
      if (facingMode === 'user') sx = 1.0 - sx;
      fingers[idx*3] = sx;
      fingers[idx*3+1] = tip.y;
      fingers[idx*3+2] = 1.0;
      idx++;
      if (idx >= 10) break;
    }
    if (idx >= 10) break;
  }
}

// --- Render loop ---
let time = 0;
function render() {
  requestAnimationFrame(render);
  if (!videoReady) return;
  time += 0.016;

  // Update camera texture
  gl.activeTexture(gl.TEXTURE2);
  gl.bindTexture(gl.TEXTURE_2D, camTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  try { gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video); } catch(e){}
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);

  // Physics simulation (Crystal mode only)
  if (currentMode === 'crystal') {
    gl.useProgram(simProg);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    setupAttrib(simProg);
    gl.viewport(0, 0, simW, simH);
    for (let iter = 0; iter < 2; iter++) {
      const prevFBO = simFBOs[0], currFBO = simFBOs[1], nextFBO = simFBOs[2];
      gl.bindFramebuffer(gl.FRAMEBUFFER, nextFBO.fb);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, prevFBO.tex);
      gl.uniform1i(simU.u_prev, 0);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_2D, currFBO.tex);
      gl.uniform1i(simU.u_curr, 1);
      gl.uniform2f(simU.u_texel, 1.0/simW, 1.0/simH);
      gl.uniform1f(simU.u_damping, 0.975);
      gl.uniform1f(simU.u_radius, 1.0);
      gl.uniform1f(simU.u_time, time);
      if (iter === 0) {
        gl.uniform3fv(simU.u_fingers, fingers);
        gl.uniform3fv(simU.u_prevFingers, prevFingers);
      } else {
        gl.uniform3fv(simU.u_fingers, new Float32Array(30));
        gl.uniform3fv(simU.u_prevFingers, new Float32Array(30));
      }
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      simFBOs[0] = currFBO; simFBOs[1] = nextFBO; simFBOs[2] = prevFBO;
    }
  }

  // Reveal mask painting
  if (currentMode === 'reveal') {
    paintMask();
  }

  // Render pass
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(renderProg);
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  setupAttrib(renderProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simFBOs[1].tex);
  gl.uniform1i(renU.u_sim, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, camTex);
  gl.uniform1i(renU.u_camera, 1);

  gl.activeTexture(gl.TEXTURE3);
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.uniform1i(renU.u_mask, 3);

  gl.uniform2f(renU.u_texel, 1.0/W, 1.0/H);
  gl.uniform2f(renU.u_simTexel, 1.0/simW, 1.0/simH);
  gl.uniform1f(renU.u_intensity, 1.0);
  gl.uniform1f(renU.u_revealMode, currentMode === 'reveal' ? 1.0 : 0.0);
  gl.uniform1f(renU.u_aspect, H/W);
  gl.uniform1f(renU.u_mirror, facingMode === 'user' ? 1.0 : 0.0);
  gl.uniform1f(renU.u_time, time);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // Starlight overlay
  updateHandPts();
  updateStars();
  drawStars();
}

// --- UI ---
const btnReveal = document.getElementById('btn-reveal');
const btnCrystal = document.getElementById('btn-crystal');
const btnStar = document.getElementById('btn-star');
const resetBtn = document.getElementById('reset-btn');
const hintEl = document.getElementById('hint');

function setMode(m) {
  currentMode = m;
  starlightOn = (m === 'starlight');
  btnReveal.classList.toggle('active', m === 'reveal');
  btnCrystal.classList.toggle('active', m === 'crystal');
  btnStar.classList.toggle('active', m === 'starlight');
  resetBtn.style.display = m === 'reveal' ? 'flex' : 'none';
  hintEl.style.opacity = m === 'reveal' ? '1' : '0';
  if (m === 'reveal') clearMask();
}

btnReveal.onclick = () => setMode('reveal');
btnCrystal.onclick = () => setMode('crystal');
btnStar.onclick = () => setMode('starlight');
resetBtn.onclick = () => clearMask();

document.getElementById('flip-btn').onclick = async () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  await startCamera(facingMode);
};

// --- Init ---
async function init() {
  resize();
  await startCamera(facingMode);
  document.getElementById('loading').classList.add('hide');
  setTimeout(() => { hintEl.style.opacity = '0'; }, 4000);
  loadMediaPipe();
  render();
}
init();
</script>
</body>
